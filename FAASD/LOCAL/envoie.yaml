version: 1.0
provider:
  name: openfaas
  gateway: http://100.78.231.17:8080
functions:
  envoie:
    lang: python3-http-debian
    handler: ./envoie
    image: etudepratique/envoie:latest
    environment:
      write_timeout: 120s
      read_timeout: 120s
      exec_timeout: 120s
    annotations:
      topic: "send"
    secrets:
      - ssh-private-key

